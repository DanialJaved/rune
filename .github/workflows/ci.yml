name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build app
        run: dotnet build src/Rune.App/Rune.App.csproj -c Release -p:Platform=x64 -p:WindowsPackageType=None

      - name: Test
        run: dotnet test tests/Rune.Tests/Rune.Tests.csproj -c Release
